name: Question
description: Ask about configuration, deployment, or usage.
title: "[Question]: "
labels: [question]
body:
  - type: markdown
    attributes:
      value: |
        Do not include credentials, TLS private keys, Terraform state, internal
        broker hostnames, or other sensitive deployment data.
  - type: textarea
    id: question
    attributes:
      label: What do you need help with?
      description: Describe the scenario and what you have tried so far.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Environment and context
      description: Include AWS region, Terraform/provider versions, proxy image, and relevant config (redacted).
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed secrets and sensitive infrastructure details.
          required: true
