name: Feature request
description: Suggest a focused improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the deployment or operational problem.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Explain the desired interface, behavior, and alternatives considered.
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security and operational impact
      description: Note any effect on public ingress, TLS, credentials, IAM, availability, or cost.
