name: Stale issues

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 90
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has been inactive for 90 days and will be closed in
            14 days unless there is new activity. Remove the `stale` label
            or leave a comment to keep it open.
          stale-pr-message: >
            This PR has been inactive for 90 days and will be closed in
            14 days unless there is new activity.
          exempt-issue-labels: "priority: critical,security"
          exempt-pr-labels: "priority: critical,security"
