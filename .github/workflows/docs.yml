name: Documentation

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/docs.yml"
  push:
    paths:
      - "**/*.md"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

jobs:
  links:
    name: Check Markdown links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress './**/*.md'
          fail: true
  terraform-docs-drift:
    name: Check Terraform documentation drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: terraform-docs/gh-actions@v1.4.1
        if: ${{ hashFiles('terraform/README.md') != '' }}
        with:
          working-dir: terraform
          output-file: README.md
          output-method: inject
          git-push: "false"
      - name: Fail if generated Terraform documentation changed
        if: ${{ hashFiles('terraform/README.md') != '' }}
        run: git diff --exit-code -- terraform/README.md
